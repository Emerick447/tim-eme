    <br><br>

    <button onclick="acces()">Ouvrir</button>

    <p id="resultat"></p>

    <script>

        function HTML(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture HTML : " + fichier;
		window.open(fichier);
        }

        function PYTHON(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Python : " + fichier;
		window.open(fichier);
        window.open('https://console.basthon.fr/');
        }

        function JAVA(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Java : " + fichier;
		window.open(fichier);
        }

        function CSS(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture CSS : " + fichier;
		window.open(fichier);
        }

        function IMG(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Image : " + fichier;
		window.open(fichier);
        }

        function APP(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Application : " + fichier;
		window.open(fichier);
        }
        function MP3(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Fichier MP3 : " + fichier;
		window.open(fichier);
        }

        function acces() {

            var choix = document.getElementById("fichier").value;

            // séparation LANGAGE:FICHIER
            var parts = choix.split(":");
            var langage = parts[0];
            var fichier = parts[1];

            switch (langage) {

                case 'HTML':
                    HTML(fichier);
                    break;

                case 'PYTHON':
                    PYTHON(fichier);
                    break;

                case 'JAVA':
                    JAVA(fichier);
                    break;

                case 'CSS':
                    CSS(fichier);
                    break;

                case 'IMG':
                    IMG(fichier);
                    break;
                    
                case 'MP3':
                    MP3(fichier);
                    break;
	   
                case 'APP':
                    APP(fichier);
                    break; 

                default:
                    document.getElementById("resultat").innerText =
                        "Langage inconnu";
            }
        }

    </script>

</body>
