<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="ouverture.css">
    <title>Ouverture de fichier</title>
</head>
<body>
    <main>
        <h2>Choisissez un fichier :</h2>

     <select id="fichier">

    <!-- 🌐 PROJETS WEB -->
    <optgroup label="🌐 Projets Web">
        <option value="HTML:site_agence_photographie/site_agence_photographie.html">Site agence photographie</option>
        <option value="CSS:site_agence_photographie/site_agence_photographie.css">Site agence photographie (CSS)</option>

        <option value="HTML:site_web_amélioré/site_web_amélioré.html">Site web amélioré</option>
        <option value="CSS:site_web_amélioré/site_web_amélioré.css">Site web amélioré (CSS)</option>
    </optgroup>

    <!-- 🎬 INTERFACES -->
    <optgroup label="🎬 Interfaces">
        <option value="HTML:Netflix/Netflix.html">Netflix</option>
        <option value="CSS:Netflix/Netflix.css">Netflix (CSS)</option>

        <option value="HTML:page de connexion/Page_de_connexion.html">Page de connexion</option>
        <option value="CSS:page de connexion/style.css">Page de connexion (CSS)</option>
    </optgroup>

    <!-- 🧪 APPRENTISSAGE -->
    <optgroup label="🧪 Apprentissage">
        <option value="HTML:ma_page_web2/ma_page_web2.html">Ma page web 2</option>

        <option value="HTML:test HTML_CSS/test html.html">Test HTML/CSS</option>
        <option value="CSS:test HTML_CSS/test css.css">Test CSS</option>

        <option value="HTML:leçon 1 HTML et CSS/leçon 1 HTML et CSS.html">Leçon HTML & CSS</option>
    </optgroup>

    <!-- 🎨 PROJETS -->
    <optgroup label="🎨 Projets">
        <option value="HTML:TROLL/troll.html">Troll</option>
        <option value="CSS:TROLL/troll.css">Troll (CSS)</option>

        <option value="HTML:i_carrotte/i_carotte.html">i_carotte</option>
        <option value="CSS:i_carrotte/i_carotte.css">i_carotte (CSS)</option>
        <option value="IMG:i_carrotte/carotte-removebg-preview.png">i_carotte (image)</option>

        <option value="HTML:louise attaque/index.html">Louise Attaque</option>
        <option value="CSS:louise attaque/style.css">Louise Attaque (CSS)</option>
        <option value="IMG:louise attaque/Icone.png">Louise Attaque (icon)</option>
    </optgroup>

    <!-- ⚙️ JS / TECH -->
    <optgroup label="⚙️ JavaScript & Tech">
        <option value="HTML:jsDOM/jsDOM.html">jsDOM</option>
        <option value="CSS:jsDOM/jsDOM.css">jsDOM (CSS)</option>
        <option value="JAVA:jsDOM/jsDOM.js">jsDOM (JS)</option>
    </optgroup>

    <!-- 📚 DIVERS -->
    <optgroup label="📚 Divers">
        <option value="HTML:sans CSS/formulaire.html">Formulaire</option>
        <option value="HTML:sans CSS/les insectes.html">Les insectes</option>
        <option value="HTML:sans CSS/anniversaire_maman.html">Anniversaire maman</option>
    </optgroup>

    <!-- 🎵 MULTIMÉDIA -->
    <optgroup label="🎵 Multimédia">
        <option value="MP3:TROLL/miaw-miaw-miaw.mp3">Audio troll</option>
    </optgroup>

    <!-- 💻 APPLICATIONS -->
    <optgroup label="💻 Applications">
        <option value="APP:APPS/EXE/Assistant Vocal.exe">Assistant Vocal (EXE)</option>
        <option value="PYTHON:APPS/PY/Assistant Vocal.py">Assistant Vocal (Python)</option>
    </optgroup>

    <!-- 🌍 WEB -->
    <optgroup label="🌍 Liens Web">
        <option value="WEB:https://emerick447.github.io/tim-eme/">Site principal</option>
        <option value="WEB:https://github.com/Emerick447/tim-eme">Dépôt GitHub</option>
    </optgroup>

</select>

        <br><br>

        <button onclick="acces()">Ouvrir</button>

        <p id="resultat"></p>
    </main>
    <script>

        function HTML(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture HTML : " + fichier;
		window.open(fichier);
        }

        function PYTHON(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Python : " + fichier;
		window.open(fichier);
        window.open('https://console.basthon.fr/');
        }

        function JAVA(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Java : " + fichier;
		window.open(fichier);
        }

        function CSS(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture CSS : " + fichier;
		window.open(fichier);
        }

        function IMG(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Image : " + fichier;
		window.open(fichier);
        }

        function APP(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Application : " + fichier;
		window.open(fichier);
        }
        function MP3(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture Fichier MP3 : " + fichier;
		window.open(fichier);
        }

        function WEB(fichier) {
            document.getElementById("resultat").innerText =
                "Ouverture lien web : " + fichier;
		window.open(fichier);
        }

    function acces() {

		let choix = document.getElementById("fichier").value;
	
	    let pos = choix.indexOf(":");
	    let type = choix.substring(0, pos);
	    let fichier = choix.substring(pos + 1);
	
	    document.getElementById("resultat").innerText =
	        "Ouverture : " + fichier;
	
	    switch(type){
	
	        case "HTML":
	        case "CSS":
	        case "JAVA":
	        case "IMG":
	        case "MP3":
	        case "APP":
	            window.open(fichier, "_blank");
	            break;
	
	        case "PYTHON":
	            window.open(fichier, "_blank");
	            window.open("https://console.basthon.fr/", "_blank");
	            break;
	
	        case "WEB":
	            window.open(fichier, "_blank");
	            break;
	
	        default:
	            document.getElementById("resultat").innerText =
	                "Type inconnu";
	    }
	}

    </script>
    <br>
    <br>
    <br>
    <a href="https://emerick447.github.io/tim-eme/">Web page</a>
    <a href="https://github.com/Emerick447/tim-eme">Web fichiers</a>
    
</body>
</html>
