<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini IA</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#202124;
    color:white;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#chatbox{
    width:90%;
    max-width:700px;
    height:80vh;
    background:#303134;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

#messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

.user{
    background:#1a73e8;
    text-align:right;
}

.bot{
    background:#3c4043;
}

#inputZone{
    display:flex;
    padding:10px;
    background:#202124;
}

#messageInput{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    margin-left:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#1a73e8;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="chatbox">
    <div id="messages"></div>

    <div id="inputZone">
        <input type="text" id="messageInput" placeholder="Écris un message...">
        <button onclick="envoyer()">Envoyer</button>
    </div>
</div>

<script>
function repondre(msg){
    msg = msg.toLowerCase();

    if(msg.includes("bonjour")) return "Bonjour !";
    if(msg.includes("salut")) return "Salut !";
    if(msg.includes("ça va") || msg.includes("ca va")) return "Je vais bien, merci.";
    if(msg.includes("nom")) return "Je suis une mini IA HTML.";
    if(msg.includes("heure")) return "Il est " + new Date().toLocaleTimeString();

    return [
        "Je ne comprends pas.",
        "Peux-tu reformuler ?",
        "Intéressant !",
        "D'accord."
    ][Math.floor(Math.random()*4)];
}

function ajouterMessage(texte, type){
    const div = document.createElement("div");
    div.className = "message " + type;
    div.textContent = texte;
    document.getElementById("messages").appendChild(div);

    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
}

function envoyer(){
    const input = document.getElementById("messageInput");
    const msg = input.value.trim();

    if(msg === "") return;

    ajouterMessage("Vous : " + msg, "user");

    setTimeout(() => {
        ajouterMessage("IA : " + repondre(msg), "bot");
    }, 300);

    input.value = "";
}

document.getElementById("messageInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        envoyer();
    }
});
</script>

</body>
</html>
