<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Copie presse-papier</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    button {
      display: block;
      margin: 10px 0;
      padding: 10px 15px;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      color: green;
    }
  </style>
</head>
<body>

<h2>Copier dans le presse-papier</h2>

<button onclick="copier('Bonjour')">Copier "Bonjour"</button>
<button onclick="copier('Emerick447')">id</button>
<button onclick="copier('GitHub c'est cool !')">mdp</button>

<p id="status"></p>

<script>
async function copier(texte) {
  try {
    await navigator.clipboard.writeText(texte);
    document.getElementById("status").textContent = "Copié : " + texte;
  } catch (err) {
    document.getElementById("status").textContent = "Erreur de copie";
    console.error(err);
  }
}
</script>

</body>
</html>
